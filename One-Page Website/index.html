<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmed AlShikh | Digital Space</title>
    <style>
        /* Modern Dark Theme Palette */
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #818cf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        html { scroll-behavior: smooth; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            line-height: 1.6;
        }

        /* Unique Navigation Bar */
        nav {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            top: 0;
            display: flex;
            justify-content: center;
            padding: 1.2rem;
            z-index: 100;
            border-bottom: 1px solid #334155;
        }

        nav a {
            color: var(--text-main);
            text-decoration: none;
            margin: 0 20px;
            font-weight: 500;
            transition: color 0.3s;
        }

        nav a:hover { color: var(--accent); }

        /* Hero / Home Section */
        #home {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle at top right, #1e1b4b, var(--bg-color));
        }

        h1 { font-size: 3.5rem; margin-bottom: 0.5rem; color: var(--accent); }

        /* Sections */
        section {
            padding: 100px 20px;
            max-width: 1000px;
            margin: auto;
        }

        /* Image Gallery Grid */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .gallery img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 12px;
            border: 2px solid #334155;
            transition: transform 0.3s;
            cursor: pointer; /* Added cursor pointer */
        }

        .gallery img:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }

        /* Video Section */
        .video-box {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .video-box iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: none;
        }

        /* Contact Form Styling */
        form {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 15px;
            display: grid;
            gap: 15px;
        }

        input, textarea {
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            padding: 12px;
            border-radius: 8px;
        }

        button {
            background: var(--accent);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        footer {
            text-align: center;
            padding: 40px;
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        /* LIGHTBOX STYLES */
        .lightbox {
            display: none;
            position: fixed;
            z-index: 1000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .lightbox.active {
            display: flex;
            opacity: 1;
        }

        .lightbox-content {
            max-width: 85%;
            max-height: 80%;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .lightbox.active .lightbox-content {
            transform: scale(1);
        }

        .close-lightbox {
            position: absolute;
            top: 30px;
            right: 40px;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
        }

        .close-lightbox:hover {
            color: var(--accent);
        }
    </style>
</head>
<body>

    <nav>
        <a href="#home">Home</a>
        <a href="#projects">Work</a>
        <a href="#media">Videos</a>
        <a href="#contact">Contact</a>
    </nav>

    <section id="home">
        <h1>Ahmed AlShikh</h1>
        <p style="font-size: 1.2rem; color: var(--text-dim);">Student & Aspiring Developer</p>
        <p>Exploring the intersection of creativity and code.</p>
    </section>

    <section id="projects">
        <h2>Visual Projects</h2>
        <div class="gallery">
            <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=600&q=80" alt="Code on a screen">
            <img src="https://images.unsplash.com/photo-1555066931-4365d14bab8c?auto=format&fit=crop&w=600&q=80" alt="Programming languages">
            <img src="https://images.unsplash.com/photo-1517694712202-14dd9538aa97?auto=format&fit=crop&w=600&q=80" alt="Laptop on desk">
        </div>
    </section>

    <!-- Lightbox Structure -->
    <div id="lightbox" class="lightbox">
        <span class="close-lightbox">&times;</span>
        <img class="lightbox-content" id="lightbox-img">
    </div>

    <section id="media">
        <h2>Focus & Learning</h2>
        <div class="video-box">
            <iframe width="560" height="315" src="https://www.youtube.com/embed/_kqQDCxRCzM?si=ApUiWhZsRc9oWFbx" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
        </div>
    </section>

    <section id="contact">
        <h2>Start a Conversation</h2>
        <form action="#">
            <input type="text" placeholder="Full Name" required>
            <input type="email" placeholder="Email Address" required>
            <textarea rows="5" placeholder="Tell me about your project..."></textarea>
            <button type="submit">Submit Message</button>
        </form>
    </section>

    <footer>
        <p>&copy; 2026 Ahmed AlShikh | Made with HTML & CSS</p>
    </footer>

    <script>
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const galleryImages = document.querySelectorAll('.gallery img');
        const closeBtn = document.querySelector('.close-lightbox');

        // Open Lightbox
        galleryImages.forEach(image => {
            image.addEventListener('click', () => {
                lightbox.classList.add('active');
                // Use the high-res version or the source of the clicked image
                lightboxImg.src = image.src;
                // Prevent scrolling while lightbox is open
                document.body.style.overflow = 'hidden';
            });
        });

        // Close Lightbox
        const closeLightbox = () => {
            lightbox.classList.remove('active');
            document.body.style.overflow = 'auto';
        };

        closeBtn.addEventListener('click', closeLightbox);

        // Close on clicking outside the image
        lightbox.addEventListener('click', (e) => {
            if (e.target !== lightboxImg) {
                closeLightbox();
            }
        });

        // Close on "Escape" key
        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape") {
                closeLightbox();
            }
        });
    </script>

</body>
</html>
